spring.application.name=TaskSmasherBack

server.port=${PORT:5000}

# DataSource
# ドライバーの設定
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# データベースへの接続URLを設定
spring.datasource.url=jdbc:${JAWSDB_URL}?serverTimezone=Asia/Tokyo&amp
#spring.datasource.url=jdbc:mysql://db:3306/springdb?serverTimezone=Asia/Tokyo&amp
#;characterEncoding=UTF-8
# データベース接続のためのユーザー名を設定
spring.datasource.username=${DATABASE_USERNAME}
# データベース接続のためのパスワードを設定
spring.datasource.password= ${DATABASE_PASSWORD}
# SQLスクリプトの初期化モードを設定
spring.sql.init.mode=always
# Log表示設定
logging.level.task_smasher.repository=DEBUG

#CORS設定のサーバー
#frontend.url=http://localhost:5173/
frontend.url=${FRONTEND_URL:http://localhost:5173/}


